name: CI

on:
  push:
    branches: ["master"]
    tags:
      - v*.*.*
  pull_request:
    branches: ["master"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux cross-compilation via Docker
          - os: ubuntu-22.04
            arch: x64
          - os: ubuntu-22.04
            arch: ia32
          - os: ubuntu-22.04
            arch: arm64
          - os: ubuntu-22.04
            arch: arm
          - os: ubuntu-22.04
            arch: mips64
          - os: ubuntu-22.04
            arch: ppc64
          - os: ubuntu-22.04
            arch: riscv64
          - os: ubuntu-22.04
            arch: loong64
          - os: ubuntu-22.04
            arch: loong64ow
          # macOS
          - os: macos-latest
            arch: arm64
          - os: macos-latest
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup the environment (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y qemu-user-static libncurses6 libtinfo6 libncurses6:i386 libtinfo6:i386
          sudo update-binfmts --enable

      - name: Build
        shell: bash
        env:
          BUILD_ARCH: ${{ matrix.arch }}
          BUILD_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: bash .github/workflows/build.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run tests
        if: matrix.arch == 'x64' || matrix.arch == 'ia32' || runner.os == 'macOS'
        run: |
          mkdir -p temp
          node --test tests/index.test.mjs

      - name: Run SDK tests
        if: matrix.arch == 'x64' || matrix.arch == 'ia32' || runner.os == 'macOS'
        env:
          BOXSH: build/boxsh
        run: node --test sdk/js/test/all.test.mjs

      - name: Release
        if: github.ref_type == 'tag'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: release/*
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true
